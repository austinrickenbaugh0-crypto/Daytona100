<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daytona 100 Elite Training Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080a;--bg2:#0e0e12;--bg3:#17171d;--bg4:#1f1f27;
  --border:#21212c;--border2:#2c2c3a;
  --orange:#f97316;--orange2:#ea580c;--orange-dim:rgba(249,115,22,0.1);
  --text:#f4f4f5;--text2:#a1a1aa;--text3:#52525b;
  --red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--green:#22c55e;--purple:#a855f7;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg)}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{width:2px}
#content::-webkit-scrollbar-thumb{background:var(--border2)}

/* Nav Navigation */
#nav{background:rgba(8,8,10,0.97);border-top:1px solid var(--border);display:flex;flex-shrink:0;backdrop-filter:blur(24px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 16px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.nav-btn.active{color:var(--orange)}
.nav-btn svg{width:20px;height:20px;stroke-width:2}

/* Layout Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.card-xs{background:var(--bg4);border-radius:8px;padding:9px 11px}
.section-title{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase;padding:14px 16px 6px}

/* Progress Tracker */
.progress-track{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange2),var(--orange));border-radius:3px;transition:width 0.4s ease}

/* Custom UI Items */
.field-label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:5px;display:block}
input[type=number], textarea{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;padding:10px 12px;width:100%;outline:none}
input:focus, textarea:focus{border-color:var(--orange)}
.btn-primary{background:var(--orange);color:#fff;font-size:14px;font-weight:700;padding:12px;border-radius:8px;border:none;cursor:pointer;width:100%}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,0.3);font-size:12px;padding:10px;border-radius:8px;cursor:pointer;width:100%}
.toggle{width:42px;height:24px;background:var(--bg4);border-radius:12px;position:relative;cursor:pointer;transition:background 0.2s}
.toggle.on{background:var(--orange)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.2s}
.toggle.on::after{transform:translateX(18px)}

.day-complete{background:rgba(249,115,22,0.06)!important;border-color:rgba(249,115,22,0.3)!important}
.week-block{border-bottom:1px solid var(--border)}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;background:var(--bg2)}
.week-body{display:none;padding:8px 12px}
.week-body.open{display:block}
.day-row{border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg3);padding:12px}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 10px}
.top-bar h1{font-size:24px;font-weight:800}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pb-nav{padding-bottom:80px}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.rule-card{border-left:3px solid var(--c,var(--orange));background:var(--bg3);padding:10px 12px;margin-bottom:8px;border-radius:0 8px 8px 0}
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="setTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Today</button>
    <button class="nav-btn" id="nav-schedule" onclick="setTab('schedule')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</button>
    <button class="nav-btn" id="nav-analytics" onclick="setTab('analytics')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Charts</button>
    <button class="nav-btn" id="nav-settings" onclick="setTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Strategy</button>
  </nav>
</div>

<script>
// ===================== ELITE 120-MILE PLAN DATA =====================
const RACE_DATE = new Date('2026-12-12T00:00:00');
const WEEKS_RAW = [
  [1,'2026-06-01',6,8,5,15,6,40],
  [2,'2026-06-08',7,9,6,16,8,46],
  [3,'2026-06-15',8,10,6,18,10,52],
  [4,'2026-06-22',6,7,5,12,5,35], // Deload
  [5,'2026-06-29',8,11,7,20,10,56],
  [6,'2026-07-06',9,12,7,22,11,61],
  [7,'2026-07-13',10,13,8,24,12,67],
  [8,'2026-07-20',6,8,5,14,7,40], // Deload
  [9,'2026-07-27',10,14,8,26,13,71],
  [10,'2026-08-03',11,15,8,28,14,76],
  [11,'2026-08-10',12,16,9,31,15,83],
  [12,'2026-08-17',7,9,6,16,8,46], // Deload
  [13,'2026-08-24',12,16,9,32,16,85],
  [14,'2026-08-31',12,17,9,35,17,90],
  [15,'2026-09-07',13,18,10,38,18,97],
  [16,'2026-09-14',8,10,6,18,8,50], // Deload
  [17,'2026-09-21',13,18,10,35,17,93],
  [18,'2026-09-28',14,19,10,40,20,103],
  [19,'2026-10-05',14,20,11,45,22,112],
  [20,'2026-10-12',9,11,7,20,10,57], // Deload
  [21,'2026-10-19',15,20,11,50,24,120], // CRITICAL PEAK WEEK
  [22,'2026-10-26',8,10,6,15,8,47],
  [23,'2026-11-02',12,16,9,32,16,85],
  [24,'2026-11-09',12,17,9,35,17,90],
  [25,'2026-11-16',10,12,8,20,10,60], // Taper 1
  [26,'2026-11-23',8,10,6,15,6,45],  // Taper 2
  [27,'2026-11-30',6,8,5,10,5,34],  // Taper 3
  [28,'2026-12-07',4,4,'REST','REST','REST',100] // Race Week (Sat is Daytona)
];

const RUN_LABELS = ['Tuesday (Steady)', 'Wednesday (Mid-Week)', 'Thursday (Easy)', 'Saturday (Primary Long)', 'Sunday (Back-to-Back)'];

function parseIso(s){ const [y,m,d]=s.split('-'); return new Date(parseInt(y),parseInt(m)-1,parseInt(d)); }
function dStr(d){ return d.toISOString().split('T')[0]; }
function fmtDate(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

function buildTimeline(){
  let list = [];
  WEEKS_RAW.forEach(([wk, startDate, tue, wed, thu, sat, sun, total]) => {
    let base = parseIso(startDate);
    let runs = [tue, wed, thu, sat, sun];
    let dayOffsets = [1, 2, 3, 5, 6]; // Tue, Wed, Thu, Sat, Sun
    
    // 1. Generate Monday Rest Day
    let monDate = new Date(base);
    list.push({
      date: dStr(monDate), week: wk, dayName: 'Monday', isRest: true, isRace: false,
      scheduledMiles: 0, label: 'REST DAY (System Recovery)'
    });

    // 2. Generate Active Running Days
    for(let i=0; i<5; i++){
      let current = new Date(base);
      current.setDate(base.getDate() + dayOffsets[i]);
      let val = runs[i];
      let isRace = (wk === 28 && i === 3); // Saturday of Week 28
      let isRest = val === 'REST';

      list.push({
        date: dStr(current),
        week: wk,
        dayName: RUN_LABELS[i].split(' ')[0],
        isRest: isRest,
        isRace: isRace,
        scheduledMiles: typeof val === 'number' ? val : 0,
        label: isRace ? '🏁 DAYTONA 100 RACE' : isRest ? 'REST DAY (Taper Flush)' : `${val} Miles — Zone 2 ${RUN_LABELS[i].split(' ')[1]}`
      });
    }

    // 3. Generate Friday Rest Day
    let friDate = new Date(base);
    friDate.setDate(base.getDate() + 4);
    let isFriRaceWeekRest = (wk === 28);
    list.push({
      date: dStr(friDate), week: wk, dayName: 'Friday', isRest: true, isRace: false,
      scheduledMiles: 0, label: isFriRaceWeekRest ? 'REST DAY (Final Carb Load)' : 'REST DAY (Weekend Prep)'
    });
  });

  // Sort timeline chronologically
  return list.sort((a,b) => a.date.localeCompare(b.date));
}

// ===================== APP STATE =====================
let State = {
  tab: 'dashboard',
  logs: buildTimeline(),
  openWeeks: new Set([1])
};

(function loadStorage(){
  const saved = localStorage.getItem('d100_elite_state');
  if(saved){
    try {
      const parsed = JSON.parse(saved);
      if(parsed && parsed.length === State.logs.length) State.logs = parsed;
    } catch(e) {}
  }
})();

function saveState(){
  localStorage.setItem('d100_elite_state', JSON.stringify(State.logs));
}

function getTodayLog(){
  let today = dStr(new Date());
  let found = State.logs.find(l => l.date === today);
  return found ? found : State.logs.find(l => !l.isCompleted) || State.logs[0];
}

// ===================== UI INTERACTIONS =====================
function setTab(t){ State.tab = t; render(); }

function render(){
  const container = document.getElementById('content');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + State.tab).classList.add('active');

  if(State.tab === 'dashboard') container.innerHTML = renderDashboard();
  else if(State.tab === 'schedule') container.innerHTML = renderSchedule();
  else if(State.tab === 'analytics') container.innerHTML = renderAnalytics();
  else container.innerHTML = renderStrategy();
}

function renderDashboard(){
  let today = getTodayLog();
  let dr = Math.max(0, Math.round((RACE_DATE - new Date().setHours(0,0,0,0)) / 86400000));
  let curWk = today.week;
  
  let completedMiles = State.logs.filter(l => l.week === curWk).reduce((acc, c) => acc + (c.isCompleted ? c.scheduledMiles : 0), 0);
  let targetedMiles = WEEKS_RAW.find(w => w[0] === curWk)[7];
  let pct = targetedMiles > 0 ? (completedMiles / targetedMiles) * 100 : 0;

  return `<div class="pb-nav">
    <div class="top-bar">
      <div>
        <div style="font-size:10px; color:var(--orange); font-weight:800; letter-spacing:1px">DAYTONA 100 ELITE</div>
        <h1>Target Schedule</h1>
      </div>
      <div style="text-align:right">
        <div style="font-size:9px; color:var(--text3); font-weight:bold">COUNTDOWN</div>
        <div style="font-size:22px; font-weight:900; color:var(--orange); line-height:1">${dr} Days</div>
      </div>
    </div>

    <div style="padding:0 16px">
      <div class="card ${today.isCompleted ? 'day-complete' : ''}" style="border-left: 4px solid var(--orange)">
        <span style="font-size:10px; color:var(--text2); font-weight:700; text-transform:uppercase">${today.dayName} · ${fmtDate(parseIso(today.date))} · Week ${today.week}</span>
        <h2 style="font-size:18px; font-weight:800; margin-top:4px; color:${today.isRace ? 'var(--red)' : 'var(--text)'}">${today.label}</h2>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:14px; background:var(--bg4); padding:10px; border-radius:8px">
          <span style="font-size:12px; color:var(--text2)">Mark Selection Completed</span>
          <div class="toggle ${today.isCompleted ? 'on' : ''}" onclick="toggleDayComplete('${today.date}')"></div>
        </div>
      </div>

      ${!today.isRest ? `
      <div class="card">
        <h3 style="font-size:12px; font-weight:700; margin-bottom:10px; text-transform:uppercase">Session Logger</h3>
        <div class="g2" style="margin-bottom:10px">
          <div>
            <label class="field-label">Actual Distance (mi)</label>
            <input type="number" id="quick-miles" step="0.1" placeholder="${today.scheduledMiles}">
          </div>
          <div>
            <label class="field-label">Duration (minutes)</label>
            <input type="number" id="quick-duration" placeholder="e.g. 180">
          </div>
        </div>
        <button class="btn-primary" onclick="logQuickSession('${today.date}')">Save Output Metrics</button>
      </div>` : ''}

      <div class="section-title">Week ${curWk} Volume Density</div>
      <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px">
          <span style="color:var(--text2)">Weekly Mileage Progress</span>
          <span style="font-weight:700">${completedMiles.toFixed(1)} / ${targetedMiles} Miles</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width: ${Math.min(100, pct)}%"></div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderSchedule(){
  let html = `<div class="pb-nav"><div class="top-bar"><h1>28-Week Plan</h1></div>`;
  
  for(let w=1; w<=28; w++){
    let wLog = State.logs.filter(l => l.week === w);
    let open = State.openWeeks.has(w);
    let totalMiles = WEEKS_RAW.find(x => x[0] === w)[7];
    let completedMiles = wLog.reduce((acc, c) => acc + (c.isCompleted ? c.scheduledMiles : 0), 0);
    let meta = WEEKS_RAW.find(x => x[0] === w);
    
    html += `<div class="week-block">
      <div class="week-header" onclick="toggleAccordion(${w})">
        <div>
          <div style="font-size:14px; font-weight:700">${w === 28 ? '🏁 RACE WEEK' : 'Week ' + w}</div>
          <div style="font-size:11px; color:var(--text2); margin-top:2px">${fmtDate(parseIso(wLog[0].date))} · Target Volume: ${totalMiles} mi</div>
        </div>
        <div style="text-align:right; display:flex; align-items:center; gap:10px">
          <span class="badge" style="font-size:11px; font-weight:bold; color:var(--orange)">${completedMiles.toFixed(0)} mi in</span>
          <span style="color:var(--text3); font-size:14px">${open ? '▲' : '▼'}</span>
        </div>
      </div>
      <div class="week-body ${open ? 'open' : ''}">`;
      
    wLog.forEach(day => {
      let isR = day.isRest;
      html += `<div class="day-row ${day.isCompleted ? 'day-complete' : ''}" style="border-left:3px solid ${isR ? 'var(--text3)' : day.isRace ? 'var(--red)' : 'var(--orange)'}">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <div>
            <div style="font-size:11px; font-weight:bold; color:var(--text2)">${day.dayName} · ${fmtDate(parseIso(day.date))}</div>
            <div style="font-size:13px; font-weight:600; margin-top:2px; color:${day.isRace ? 'var(--red)' : 'inherit'}">${day.label}</div>
          </div>
          <div class="toggle ${day.isCompleted ? 'on' : ''}" onclick="toggleDayComplete('${day.date}')"></div>
        </div>
      </div>`;
    });
    
    html += `</div></div>`;
  }
  
  html += `</div>`;
  return html;
}

function renderAnalytics(){
  let totalSched = State.logs.reduce((acc,c)=>acc+c.scheduledMiles, 0);
  let totalAct = State.logs.reduce((acc,c)=>acc+(c.actualMiles || 0), 0);
  return `<div class="pb-nav" style="padding:16px">
    <div class="top-bar" style="padding:0 0 16px 0"><h1>Charts & Data</h1></div>
    <div class="card">
      <div class="stat-row"><span style="color:var(--text2)">Plan Volume Target</span><span style="font-weight:700">${totalSched} mi</span></div>
      <div class="stat-row"><span style="color:var(--text2)">Actual Distance Logged</span><span style="font-weight:700; color:var(--orange)">${totalAct.toFixed(1)} mi</span></div>
      <div class="stat-row"><span style="color:var(--text2)">Peak Training Target</span><span style="font-weight:700">120 Miles (Wk 21)</span></div>
      <div class="stat-row" style="border-bottom:none"><span style="color:var(--text2)">DNF Reset Timeline</span><span>28 Weeks Structural Build</span></div>
    </div>
    <div class="card" style="text-align:center; padding:40px 16px; color:var(--text3); font-size:12px">
      LocalStorage tracking modules active.<br><span style="color:var(--orange); font-size:11px">Updates auto-cache securely on Safari Home Screen.</span>
    </div>
  </div>`;
}

function renderStrategy(){
  return `<div class="pb-nav" style="padding:16px">
    <div class="top-bar" style="padding:0 0 16px 0"><h1>DNF Correction</h1></div>
    <div class="rule-card" style="--c:var(--orange)"><div class="rule-title">Strict Zone 2 Control</div><div style="font-size:12px; color:var(--text2)">Mile 38 failures are tracking pacing/glycogen errors. Run slow, keep your engine cool, and burn fat stores efficiently.</div></div>
    <div class="rule-card" style="--c:var(--purple)"><div class="rule-title">Back-to-Back Adaptation</div><div style="font-size:12px; color:var(--text2)">Saturday and Sunday runs are stacked intentionally. Teaches your brain and muscle tissue to work under severe depletion.</div></div>
    <div class="rule-card" style="--c:var(--red)"><div class="rule-title">The 4-Week Extended Taper</div><div style="font-size:12px; color:var(--text2)">A 120-mile peak creates massive tissue damage. Do not skip the month-long down-scaling cycle before race week.</div></div>
    <button class="btn-danger" style="margin-top:24px" onclick="wipeSystem()">Reset Application Database</button>
  </div>`;
}

// ===================== LOGIC ACTUATORS =====================
function toggleDayComplete(date){
  let log = State.logs.find(l => l.date === date);
  if(log) { log.isCompleted = !log.isCompleted; if(log.isCompleted && log.scheduledMiles > 0 && !log.actualMiles) log.actualMiles = log.scheduledMiles; saveState(); render(); }
}

function toggleAccordion(w){
  if(State.openWeeks.has(w)) State.openWeeks.delete(w);
  else State.openWeeks.add(w);
  render();
}

function logQuickSession(date){
  let log = State.logs.find(l => l.date === date);
  if(log){
    let m = document.getElementById('quick-miles').value;
    let d = document.getElementById('quick-duration').value;
    if(m) log.actualMiles = parseFloat(m);
    if(d) log.actualDuration = parseInt(d);
    log.isCompleted = true;
    saveState(); render(); alert("Session logged successfully!");
  }
}

function wipeSystem(){
  if(confirm("Wipe all tracking matrices?")){ localStorage.removeItem('d100_elite_state'); State.logs = buildTimeline(); render(); }
}

render();
</script>
</body>
</html>
